<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contemporary Chinese History — Timeline</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Source+Sans+3:wght@300;400;600&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
    <style>
        :root {
            --ink: #1a1a1a;
            --paper: #f5f0e8;
            --paper-light: #faf7f1;
            --accent: #b8342e;
            --muted: #7a7062;
            --line: #d4cbbf;
            --line-light: #e8e1d6;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Source Sans 3', sans-serif;
            background: var(--paper);
            color: var(--ink);
            line-height: 1.6;
        }

        header {
            text-align: center;
            padding: 3.5rem 2rem 2.5rem;
            border-bottom: 1px solid var(--line);
        }

        header h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(1.8rem, 5vw, 2.8rem);
            margin-bottom: 0.4rem;
        }

        header p {
            color: var(--muted);
            font-weight: 300;
        }

        .timeline {
            max-width: 720px;
            margin: 0 auto;
            padding: 2rem 2rem 4rem;
            position: relative;
        }

        /* Vertical line */
        .timeline::before {
            content: '';
            position: absolute;
            left: 6.5rem;
            top: 2rem;
            bottom: 4rem;
            width: 2px;
            background: var(--line);
        }

        .event {
            display: flex;
            gap: 1.5rem;
            margin-bottom: 1.5rem;
            position: relative;
        }

        .event-date {
            flex-shrink: 0;
            width: 5rem;
            text-align: right;
            padding-top: 1rem;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem;
            color: var(--accent);
            line-height: 1.4;
        }

        /* Dot */
        .event-dot {
            flex-shrink: 0;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: var(--paper);
            border: 2px solid var(--accent);
            margin-top: 1.1rem;
            z-index: 1;
            transition: background 0.2s;
        }

        /* For span events, make it a diamond */
        .event.span .event-dot {
            border-radius: 2px;
            transform: rotate(45deg);
        }

        .event:hover .event-dot {
            background: var(--accent);
        }

        .event-card {
            flex: 1;
            background: var(--paper-light);
            border: 1px solid var(--line-light);
            padding: 1rem 1.25rem;
            cursor: pointer;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .event-card:hover {
            border-color: var(--line);
            box-shadow: 0 2px 12px rgba(0,0,0,0.04);
        }

        .event-card.open {
            border-left: 3px solid var(--accent);
        }

        .event-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.1rem;
            font-weight: 700;
        }

        .event-notes {
            display: none;
            margin-top: 0.75rem;
            padding-top: 0.75rem;
            border-top: 1px solid var(--line-light);
            font-size: 0.92rem;
            color: #3a3630;
            line-height: 1.7;
        }

        .event-notes.show { display: block; }
        .event-notes p { margin-bottom: 0.5rem; }
        .event-notes ul { margin: 0.4rem 0 0.5rem 1.2rem; }

        footer {
            text-align: center;
            padding: 1.5rem;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.6rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--muted);
            border-top: 1px solid var(--line-light);
        }

        @media (max-width: 500px) {
            .timeline::before { left: 1rem; }
            .event-date { width: auto; min-width: 0; font-size: 0.65rem; }
            .event { gap: 0.75rem; }
        }
    </style>
</head>
<body>

<header>
    <h1>Contemporary Chinese History</h1>
    <p>Course notes & timeline</p>
</header>

<div class="timeline" id="timeline"></div>

<footer>Last updated — <span id="updated"></span></footer>

<script>
/*
 * ════════════════════════════════════════════════════════════
 *   YOUR EVENTS — edit this array to add/remove entries
 * ════════════════════════════════════════════════════════════
 *
 *  year:      number, used for sorting
 *  date:      display string — "1949" or "1958–1962" etc.
 *  title:     event name
 *  notes:     your notes (HTML ok: <p>, <ul>, <li>, <em>, <strong>)
 *  span:      (optional) true if event covers multiple years
 */

const EVENTS = [
{
    year: 1911,
    date: "1911",
    title: "Xinhai Revolution",
    notes: `
        <p>The Wuchang Uprising triggers a chain of provincial secessions from the Qing dynasty. Sun Yat-sen returns from abroad and is inaugurated as provisional president of the Republic of China in January 1912. The last emperor, Puyi, abdicates in February 1912, ending over two thousand years of imperial rule.</p>
        <ul>
            <li>Sun quickly cedes the presidency to Yuan Shikai, who commands the Beiyang Army — military power trumps revolutionary legitimacy</li>
            <li>The revolution succeeds in toppling the dynasty but fails to establish a stable republic</li>
        </ul>
    `
},
{
    year: 1916,
    date: "1916–1928",
    title: "Warlord Era",
    span: true,
    notes: `
        <p>After Yuan Shikai's failed monarchical restoration and death in 1916, central authority collapses. Regional military strongmen carve China into competing power bases — the Zhili, Anhui, and Fengtian cliques among the most prominent.</p>
        <ul>
            <li>Beijing government is nominally the Republic of China but controls little beyond the capital region</li>
            <li>Constant shifting alliances and small-scale wars between cliques</li>
            <li>Sun Yat-sen establishes a rival government in Guangzhou, eventually reorganizes the KMT along Leninist party lines with Soviet aid</li>
            <li>Ends with the Northern Expedition (1926–1928) — Chiang Kai-shek's KMT forces reunify most of the country, at least nominally</li>
        </ul>
    `
},
    {
        year: 1919,
        date: "1919",
        title: "May Fourth Movement",
        notes: `
            <p>Student protests against the Treaty of Versailles and the transfer of German concessions in Shandong to Japan. Catalyzes a broader intellectual and cultural movement questioning Confucian tradition and embracing science and democracy.</p>
        `
    },
    {
        year: 1921,
        date: "1921",
        title: "Founding of the Chinese Communist Party",
        notes: `
            <p>The CCP is founded in Shanghai with around 50 members. Early party organizing draws on Comintern support and Marxist study circles that emerged from the May Fourth era.</p>
        `
    },
    {
    year: 1927,
    date: "April 12, 1927",
    title: "Shanghai Massacre",
    notes: `
        <p>Chiang Kai-shek turns on his Communist allies during the Northern Expedition, unleashing a violent purge of CCP members and labor organizers in Shanghai. The crackdown extends nationwide in the following weeks, effectively ending the First United Front.</p>
        <ul>
            <li>Thousands killed — CCP driven underground or into rural base areas</li>
            <li>A left-KMT government in Wuhan tries to maintain the alliance but also expels Communists by July</li>
            <li>Forces the CCP toward Mao's rural peasant-based revolutionary strategy, breaking from orthodox urban Marxism</li>
            <li>Sets the stage for the Jiangxi Soviet, the Long March, and two decades of KMT-CCP conflict</li>
        </ul>
    `
    },
    {
        year: 1934,
        date: "1934–1935",
        title: "The Long March",
        span: true,
        notes: `
            <p>The Red Army retreats ~6,000 miles from Jiangxi to Shaanxi to escape KMT encirclement. Mao consolidates leadership during the march. It becomes a founding myth of the PRC.</p>
        `
    },
    {
        year: 1937,
        date: "1937–1945",
        title: "Second Sino-Japanese War",
        span: true,
        notes: `
            <p>Full-scale war with Japan. The KMT bears the brunt of conventional fighting while the CCP builds rural base areas behind Japanese lines. The war reshapes the balance of power between the two parties.</p>
        `
    },
    {
        year: 1946,
        date: "1946–1949",
        title: "Chinese Civil War (Final Phase)",
        span: true,
        notes: `
            <p>Full-scale civil war resumes after WWII. CCP land reform campaigns build rural support while KMT suffers from hyperinflation and military overextension. The KMT retreats to Taiwan by late 1949.</p>
        `
    },
    {
        year: 1949,
        date: "October 1, 1949",
        title: "Founding of the People's Republic of China",
        notes: `
            <p>Mao proclaims the PRC from Tiananmen Gate. "New Democracy" framework guides the early state — a coalition in rhetoric, CCP consolidation in practice.</p>
            <ul>
                <li>Land reform campaigns intensify in rural areas</li>
                <li>KMT retreats to Taiwan — sovereignty question remains unresolved</li>
            </ul>
        `
    },
    {
        year: 1950,
        date: "1950–1953",
        title: "Korean War",
        span: true,
        notes: `
            <p>China intervenes in Korea under the banner of "Resist America, Aid Korea." The war enables domestic mass campaigns against internal "enemies" and cements the PRC's Cold War alignment.</p>
        `
    },
    {
        year: 1956,
        date: "1956–1957",
        title: "Hundred Flowers & Anti-Rightist Campaign",
        span: true,
        notes: `
            <p>"Let a hundred flowers bloom" — Mao invites criticism of the Party, then reverses course. The Anti-Rightist Campaign labels hundreds of thousands as rightists. A pattern of invited openness followed by repression.</p>
        `
    },
    {
        year: 1958,
        date: "1958–1962",
        title: "Great Leap Forward",
        span: true,
        notes: `
            <p>Mao's campaign to rapidly industrialize through collectivization and backyard steel production. Results in catastrophic famine — estimated 15–55 million deaths.</p>
            <ul>
                <li>Utopian voluntarism collides with material constraints</li>
                <li>Information failures: local cadres inflate production figures</li>
                <li>Lushan Conference (1959) — Peng Dehuai's criticism leads to his purge</li>
                <li>Mao temporarily retreats from day-to-day leadership</li>
            </ul>
        `
    },
    {
        year: 1966,
        date: "1966–1976",
        title: "Great Proletarian Cultural Revolution",
        span: true,
        notes: `
            <p>Mao launches the Cultural Revolution to reassert ideological control, purge rivals (especially Liu Shaoqi and Deng Xiaoping), and renew revolutionary spirit. Red Guards mobilize across the country.</p>
            <ul>
                <li>Intellectuals, officials, and "class enemies" persecuted</li>
                <li>Factional violence and social upheaval on a massive scale</li>
                <li>Sent-down youth — millions of urban students sent to the countryside</li>
                <li>Lin Biao affair (1971) — Mao's designated successor dies fleeing China</li>
                <li>Ends with Mao's death in September 1976</li>
            </ul>
        `
    },
    {
        year: 1972,
        date: "1972",
        title: "Nixon Visits China",
        notes: `
            <p>Nixon's visit to Beijing and the Shanghai Communiqué mark a dramatic Cold War realignment. Both sides share a strategic interest in countering the Soviet Union.</p>
        `
    },
    {
        year: 1978,
        date: "December 1978",
        title: "Reform and Opening Up",
        notes: `
            <p>The Third Plenum of the 11th Central Committee launches Deng Xiaoping's reform era. De-collectivization, Special Economic Zones, and opening to foreign investment.</p>
            <p>"Practice as the sole criterion of truth" provides ideological cover for pragmatic policy.</p>
        `
    },
    {
        year: 1989,
        date: "June 4, 1989",
        title: "Tiananmen Square Protests",
        notes: `
            <p>Student-led pro-democracy protests in Beijing are violently suppressed. A defining moment in PRC history and in China's relationship with the West.</p>
        `
    },
];

// ════════════════════════════════════════════════════════════
//  Render (you don't need to edit below)
// ════════════════════════════════════════════════════════════

function render() {
    const el = document.getElementById('timeline');
    const sorted = [...EVENTS].sort((a, b) => a.year - b.year);

    el.innerHTML = sorted.map(ev => `
        <div class="event ${ev.span ? 'span' : ''}" onclick="toggle(this)">
            <div class="event-date">${ev.date}</div>
            <div class="event-dot"></div>
            <div class="event-card">
                <div class="event-title">${ev.title}</div>
                <div class="event-notes">${ev.notes}</div>
            </div>
        </div>
    `).join('');
}

function toggle(el) {
    const card = el.querySelector('.event-card');
    const notes = el.querySelector('.event-notes');
    card.classList.toggle('open');
    notes.classList.toggle('show');
}

document.getElementById('updated').textContent = new Date().toLocaleDateString('en-US', {
    year: 'numeric', month: 'long', day: 'numeric'
});

render();
</script>
</body>
</html>
