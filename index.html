<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contemporary Chinese History — Timeline</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Source+Sans+3:wght@300;400;600&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
    <style>
        :root {
            --ink: #1a1a1a;
            --paper: #f5f0e8;
            --paper-light: #faf7f1;
            --accent: #b8342e;
            --muted: #7a7062;
            --line: #d4cbbf;
            --line-light: #e8e1d6;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Source Sans 3', sans-serif;
            background: var(--paper);
            color: var(--ink);
            line-height: 1.6;
        }

        header {
            text-align: center;
            padding: 3.5rem 2rem 2.5rem;
            border-bottom: 1px solid var(--line);
        }

        header h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(1.8rem, 5vw, 2.8rem);
            margin-bottom: 0.4rem;
        }

        header p {
            color: var(--muted);
            font-weight: 300;
        }

        .timeline {
            max-width: 720px;
            margin: 0 auto;
            padding: 2rem 2rem 4rem;
            position: relative;
        }

        /* Vertical line */
        .timeline::before {
            content: '';
            position: absolute;
            left: 6.5rem;
            top: 2rem;
            bottom: 4rem;
            width: 2px;
            background: var(--line);
        }

        .event {
            display: flex;
            gap: 1.5rem;
            margin-bottom: 1.5rem;
            position: relative;
        }

        .event-date {
            flex-shrink: 0;
            width: 5rem;
            text-align: right;
            padding-top: 1rem;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem;
            color: var(--accent);
            line-height: 1.4;
        }

        /* Dot */
        .event-dot {
            flex-shrink: 0;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: var(--paper);
            border: 2px solid var(--accent);
            margin-top: 1.1rem;
            z-index: 1;
            transition: background 0.2s;
        }

        /* For span events, make it a diamond */
        .event.span .event-dot {
            border-radius: 2px;
            transform: rotate(45deg);
        }

        .event:hover .event-dot {
            background: var(--accent);
        }

        .event-card {
            flex: 1;
            background: var(--paper-light);
            border: 1px solid var(--line-light);
            padding: 1rem 1.25rem;
            cursor: pointer;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .event-card:hover {
            border-color: var(--line);
            box-shadow: 0 2px 12px rgba(0,0,0,0.04);
        }

        .event-card.open {
            border-left: 3px solid var(--accent);
        }

        .event-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.1rem;
            font-weight: 700;
        }

        .event-notes {
            display: none;
            margin-top: 0.75rem;
            padding-top: 0.75rem;
            border-top: 1px solid var(--line-light);
            font-size: 0.92rem;
            color: #3a3630;
            line-height: 1.7;
        }

        .event-notes.show { display: block; }
        .event-notes p { margin-bottom: 0.5rem; }
        .event-notes ul { margin: 0.4rem 0 0.5rem 1.2rem; }

        footer {
            text-align: center;
            padding: 1.5rem;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.6rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--muted);
            border-top: 1px solid var(--line-light);
        }

        @media (max-width: 500px) {
            .timeline::before { left: 1rem; }
            .event-date { width: auto; min-width: 0; font-size: 0.65rem; }
            .event { gap: 0.75rem; }
        }
    </style>
</head>
<body>

<header>
    <h1>Contemporary Chinese History</h1>
    <p>Timeline</p>
</header>

<div class="timeline" id="timeline"></div>

<footer>Last updated — <span id="updated"></span></footer>

// ════════════════════════════════════════════════════════════
//  Render (you don't need to edit below)
// ════════════════════════════════════════════════════════════

function render() {
    const el = document.getElementById('timeline');
    const sorted = [...EVENTS].sort((a, b) => a.year - b.year);

    el.innerHTML = sorted.map(ev => `
        <div class="event ${ev.span ? 'span' : ''}" onclick="toggle(this)">
            <div class="event-date">${ev.date}</div>
            <div class="event-dot"></div>
            <div class="event-card">
                <div class="event-title">${ev.title}</div>
                <div class="event-notes">${ev.notes}</div>
            </div>
        </div>
    `).join('');
}

function toggle(el) {
    const card = el.querySelector('.event-card');
    const notes = el.querySelector('.event-notes');
    card.classList.toggle('open');
    notes.classList.toggle('show');
}

document.getElementById('updated').textContent = new Date().toLocaleDateString('en-US', {
    year: 'numeric', month: 'long', day: 'numeric'
});

render();

</body>
</html>
